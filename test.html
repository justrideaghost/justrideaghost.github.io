<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Firebase Handler PostMessage Tester</title>
  <style>
    body { font-family: Arial; padding: 20px; direction: rtl; }
    pre { background: #f4f4f4; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>

  <h2>Firebase Auth Handler PostMessage Tester</h2>
  <input type="text" id="handlerUrl" placeholder="Firebase Handler URL" style="width: 80%; padding: 10px;" />
  <br><br>
  <button onclick="openPopup()">باز کردن Popup</button>

  <h3>دریافتی‌ها:</h3>
  <pre id="log"></pre>

  <script>
    const logEl = document.getElementById('log');

    function log(message) {
      const time = new Date().toLocaleTimeString('fa-IR');
      logEl.innerHTML += `<b>[${time}]</b> ${message}<br>`;
      console.log(message);
    }

    let popup = null;

    function openPopup() {
      const url = document.getElementById('handlerUrl').value.trim();
      
      if (!url) {
        alert("لطفاً URL handler رو وارد کن");
        return;
      }

      log("در حال باز کردن popup...");

      popup = window.open(
        url,
        "firebasePopup",
        "width=650,height=700,scrollbars=yes"
      );

      if (!popup) {
        log("❌ Popup مسدود شد! لطفاً پاپ‌آپ بلاکر رو خاموش کن.");
      }
    }

    // گوش دادن به همه پیام‌ها
    window.addEventListener('message', function(event) {
      log(`📨 پیام دریافتی از: <b>${event.origin}</b>`);

      console.log("Full Event:", event);
      console.log("Data:", event.data);

      log(`نوع رویداد: <b>${event.data?.eventType || 'نامشخص'}</b>`);

      if (event.data && event.data.eventType) {
        log(`✅ eventType = ${event.data.eventType}`);
        
        if (event.data.data) {
          log(`داده: ${JSON.stringify(event.data.data, null, 2)}`);
        }
      } else {
        log(`داده خام: ${JSON.stringify(event.data)}`);
      }

      // اگر پیام sendAuthEvent بود، جزئیات بیشتری نشان بده
      if (event.data?.eventType === "sendAuthEvent") {
        log("🔥 <b>sendAuthEvent دریافت شد!</b>");
      }
    });

    // چک کردن اینکه popup بسته شد
    setInterval(() => {
      if (popup && popup.closed) {
        log("Popup بسته شد.");
        popup = null;
      }
    }, 1000);
  </script>

</body>
</html>
