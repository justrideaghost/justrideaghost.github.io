<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Your auth token</title>
</head>
<body>
  <h2>Your auth token</h2>
  <pre id="token"></pre>

<script>
  // Get the token value from URL parameters
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';

  // Display token or a message if not found
  document.getElementById('token').textContent = token ? token : 'No token found in URL.';
</script>
</body>
</html>
